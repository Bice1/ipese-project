<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160">
  <!-- Generic process unit box -->
  <rect x="10" y="10" width="300" height="140" rx="8" ry="8"
        fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <!-- Inner decorative band -->
  <rect x="10" y="10" width="300" height="30" rx="8" ry="8"
        fill="#2563EB"/>
  <rect x="10" y="28" width="300" height="12" fill="#2563EB"/>
  <!-- Unit icon: simple gear-like circle -->
  <circle cx="160" cy="105" r="28" fill="none" stroke="#2563EB" stroke-width="2"/>
  <circle cx="160" cy="105" r="12" fill="#2563EB" opacity="0.25"/>
  <line x1="160" y1="73" x2="160" y2="137" stroke="#2563EB" stroke-width="2"/>
  <line x1="128" y1="105" x2="192" y2="105" stroke="#2563EB" stroke-width="2"/>
  <line x1="136" y1="81" x2="184" y2="129" stroke="#2563EB" stroke-width="2"/>
  <line x1="184" y1="81" x2="136" y2="129" stroke="#2563EB" stroke-width="2"/>
  <!-- Label (replaced by unit name when diagram.py uses this as default_core.svg) -->
  <text x="160" y="32" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="13"
        font-weight="600" fill="white">Core SVG</text>
</svg>
